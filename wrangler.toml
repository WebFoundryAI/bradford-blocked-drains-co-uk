name = "bradford-trailing-slash-rewrite"
type = "javascript"
main = "src/worker.ts"
workers_dev = false

[env.production]
routes = [
  { pattern = "bradfordblockeddrains.co.uk/*", zone_id = "" }
]

[env.development]
vars = { ENVIRONMENT = "development" }
routes = [
  { pattern = "bradfordblockeddrains.co.uk/*", zone_id = "" }
]

compatibility_date = "2024-12-20"

[[d1_databases]]
binding = "DB"
database_name = "bradford-leads"
database_id = "PLACEHOLDER_DATABASE_ID"

[build]
command = "bun install && bun run build"
cwd = "./"
main = "dist/worker.js"

[build.upload]
format = "service-worker"
