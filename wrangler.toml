name = "bradford-trailing-slash-rewrite"
type = "javascript"
main = "src/worker.ts"
workers_dev = false

[env.production]
routes = [
  { pattern = "bradfordblockeddrains.co.uk/*", zone_id = "7ab1b3cb2f4d9b6c1de713742440b31b" }
]

[env.development]
vars = { ENVIRONMENT = "development" }
routes = [
  { pattern = "bradfordblockeddrains.co.uk/*", zone_id = "7ab1b3cb2f4d9b6c1de713742440b31b" }
]

compatibility_date = "2024-12-20"

[[d1_databases]]
binding = "DB"
database_name = "bradford-leads"
database_id = "53c85056-4f7b-4d16-b054-8d8045e43e7f"
